name: Deploy to Firebase Hosting

on:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master
  workflow_dispatch:   # Allow manual trigger from the Actions tab

jobs:
  # ── Quality gate — runs on every push and every PR ──────────────────────────
  test_and_analyse:
    name: Analyse & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Install dependencies
        run: flutter pub get

      - name: Analyse (static analysis)
        run: flutter analyze --no-fatal-infos

      - name: Run unit tests
        run: flutter test --no-pub

  # ── Production deploy — runs only on push to main / master ──────────────────
  build_and_deploy:
    name: Build & Deploy
    needs: test_and_analyse          # Deploy only if quality gate passes
    if: github.event_name == 'push'  # Not on PR events — tests only for PRs
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Install dependencies
        run: flutter pub get

      - name: Build Web App
        # --no-tree-shake-icons prevents icon font trimming issues on web.
        run: flutter build web --no-tree-shake-icons --release

      - name: Deploy to Firebase Hosting
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: '${{ secrets.GITHUB_TOKEN }}'
          # Add this secret in GitHub → Settings → Secrets → Actions:
          # FIREBASE_SERVICE_ACCOUNT_EDUPLAY_8792F
          firebaseServiceAccount: '${{ secrets.FIREBASE_SERVICE_ACCOUNT_EDUPLAY_8792F }}'
          channelId: live
          projectId: eduplay-8792f
